<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Library Management Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        :root {
            --bg: #0a0f18;
            /* Deep elegant dark */
            --surface: #141c2b;
            --card: rgba(255, 255, 255, 0.03);
            --primary: #cba876;
            /* Gold accent */
            --primary-dim: rgba(203, 168, 118, 0.2);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
        }

        /* Elegant Sidebar */
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 50px;
            text-align: center;
            letter-spacing: 1px;
        }

        .brand span {
            font-weight: 400;
            color: var(--text);
            font-style: italic;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-links a.active,
        .nav-links a:hover {
            background: var(--primary-dim);
            color: var(--primary);
            box-shadow: inset 3px 0 0 var(--primary);
        }

        /* Main Area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px 60px;
            overflow-y: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        .search-container {
            position: relative;
            width: 500px;
        }

        .search-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 16px 25px;
            border-radius: 30px;
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(203, 168, 118, 0.15);
        }

        .profile-pill {
            background: var(--surface);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        /* Books Grid */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            margin-bottom: 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 40px;
        }

        .book-card {
            background: transparent;
            perspective: 1000px;
            cursor: pointer;
        }

        .book-cover {
            width: 100%;
            height: 320px;
            border-radius: 8px 16px 16px 8px;
            background: var(--surface);
            box-shadow: inset 4px 0 10px rgba(0, 0, 0, 0.5), 0 10px 20px rgba(0, 0, 0, 0.8);
            position: relative;
            transition: transform 0.4s ease;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .book-card:hover .book-cover {
            transform: translateY(-10px) rotateY(-5deg);
            box-shadow: inset 4px 0 10px rgba(0, 0, 0, 0.5), 20px 20px 30px rgba(0, 0, 0, 0.9);
            border-color: var(--primary);
        }

        .cover-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: white;
            margin-bottom: 10px;
        }

        .cover-author {
            font-size: 14px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .book-info {
            margin-top: 20px;
        }

        .book-title {
            font-size: 16px;
            font-weight: 600;
            color: white;
            margin-bottom: 5px;
        }

        .book-author {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Unique cover backgrounds */
        .bg-1 {
            background: linear-gradient(135deg, #1e3a8a, #0f172a);
        }

        .bg-2 {
            background: linear-gradient(135deg, #78350f, #27272a);
        }

        .bg-3 {
            background: linear-gradient(135deg, #064e3b, #020617);
        }

        .bg-4 {
            background: linear-gradient(135deg, #4c1d95, #171717);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="brand">Lumina <span>Library</span></div>
        <div class="nav-links">
            <a href="#" class="active">Discover</a>
            <a href="#">My Collection</a>
            <a href="#">Audiobooks</a>
            <a href="#">Authors</a>
            <a href="#">Settings</a>
            <a href="../../Portfolio Website.html" style="margin-top: 50px;">← Portfolio</a>
        </div>
    </div>

    <div class="main">
        <div class="top-bar">
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Search by title, author, or genre...">
            </div>
            <div class="profile-pill">
                Admin
            </div>
        </div>

        <div class="section-title">
            Trending Masterpieces
            <span
                style="font-size:16px; font-family:'Plus Jakarta Sans', sans-serif; color:var(--primary); cursor:pointer;">View
                All →</span>
        </div>

        <div class="books-grid" id="booksGrid">
            <!-- Populated via JS -->
        </div>
    </div>

    <script>
        const books = [
            { bg: 'bg-1', title: 'The Silent Ocean', author: 'Elena Martinez' },
            { bg: 'bg-2', title: 'Echoes of Time', author: 'Robert Sterling' },
            { bg: 'bg-3', title: 'Whispering Shadows', author: 'Anya Volkov' },
            { bg: 'bg-4', title: 'Neon Gods', author: 'J.T. Cross' },
            { bg: 'bg-1', title: 'Azure Chronicles', author: 'S.L. Thorne' }
        ];

        const grid = document.getElementById('booksGrid');
        books.forEach(book => {
            grid.innerHTML += `
        <div class="book-card" onclick="alert('Book details feature coming soon!')">
          <div class="book-cover ${book.bg}">
            <div class="cover-title">${book.title}</div>
            <div class="cover-author">${book.author}</div>
          </div>
          <div class="book-info">
            <div class="book-title">${book.title}</div>
            <div class="book-author">${book.author}</div>
          </div>
        </div>
      `;
        });
    </script>
</body>

</html>
