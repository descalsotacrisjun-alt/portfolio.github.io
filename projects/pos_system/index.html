<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen POS Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --bg: #09090b;
            --surface: #18181b;
            --card: #27272a;
            --primary: #06b6d4;
            --primary-glow: rgba(6, 182, 212, 0.4);
            --secondary: #8b5cf6;
            --text: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: #3f3f46;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 100px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 40px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .nav-item {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 20px;
        }

        .nav-item.active,
        .nav-item:hover {
            background: var(--card);
            color: var(--primary);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.1);
        }

        /* Main Content */
        .main {
            flex: 1;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 12px 25px;
            width: 400px;
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* Categories */
        .categories {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .cat-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 30px;
            border-radius: 25px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .cat-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            box-shadow: 0 5px 15px var(--primary-glow);
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), 0 0 15px var(--primary-glow);
        }

        .product-img {
            height: 140px;
            border-radius: 12px;
            background: var(--card);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            background: linear-gradient(135deg, #27272a, #18181b);
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .product-price {
            color: var(--primary);
            font-weight: 700;
            font-size: 20px;
        }

        /* Cart / Order Section */
        .cart-section {
            width: 380px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        .cart-header {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
        }

        .order-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 25px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .order-img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--card);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .qty-btn {
            color: var(--primary);
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        .cart-summary {
            border-top: 1px dashed var(--border);
            padding-top: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: var(--text-muted);
            font-size: 16px;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        .pay-btn {
            width: 100%;
            padding: 20px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 22px;
            font-weight: 700;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px var(--primary-glow);
            transition: all 0.3s;
        }

        .pay-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(139, 92, 246, 0.5);
        }

        /* Return Button */
        .return-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo-icon">POS</div>
        <div class="nav-item active">🏠</div>
        <div class="nav-item">📊</div>
        <div class="nav-item">⚙️</div>
        <div class="nav-item">👤</div>
        <a href="../../Portfolio Website.html" class="return-btn">← Back</a>
    </div>

    <div class="main">
        <div class="header">
            <h1>NextGen <span>Dashboard</span></h1>
            <input type="text" class="search-bar" placeholder="Search products, orders...">
        </div>

        <div class="categories">
            <div class="cat-btn active">All Items</div>
            <div class="cat-btn">Hot Drinks</div>
            <div class="cat-btn">Cold Beverages</div>
            <div class="cat-btn">Pastries</div>
            <div class="cat-btn">Sandwiches</div>
        </div>

        <div class="product-grid" id="productGrid">
            <!-- Generated via JS -->
        </div>
    </div>

    <div class="cart-section">
        <div class="cart-header">
            <span>Current Order</span>
            <span style="color:var(--text-muted); font-size:16px;">#8492</span>
        </div>

        <div class="order-list" id="orderList">
            <!-- Generated via JS -->
        </div>

        <div class="cart-summary">
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal">$0.00</span>
            </div>
            <div class="summary-row">
                <span>Tax (10%)</span>
                <span id="tax">$0.00</span>
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span id="total" style="color: var(--primary);">$0.00</span>
            </div>
            <button class="pay-btn" onclick="alert('Payment Processing Backend Required!')">Charge Payment</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: 'Cyber Espresso', price: 4.50, icon: '☕' },
            { id: 2, name: 'Neon Latte', price: 5.50, icon: '🥛' },
            { id: 3, name: 'Quantum Cold Brew', price: 6.00, icon: '🧊' },
            { id: 4, name: 'Holo Croissant', price: 3.50, icon: '🥐' },
            { id: 5, name: 'Synthwave Mocha', price: 5.00, icon: '☕' },
            { id: 6, name: 'Matcha Matrix', price: 5.50, icon: '🍵' },
            { id: 7, name: 'Data Donut', price: 2.50, icon: '🍩' },
            { id: 8, name: 'Glitch Sandwich', price: 7.50, icon: '🥪' }
        ];

        let cart = [
            { id: 1, name: 'Cyber Espresso', price: 4.50, icon: '☕', qty: 2 }
        ];

        const grid = document.getElementById('productGrid');
        const orderList = document.getElementById('orderList');

        function renderProducts() {
            grid.innerHTML = '';
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => addToCart(p);
                card.innerHTML = `
          <div class="product-img">${p.icon}</div>
          <div class="product-title">${p.name}</div>
          <div class="product-price">$${p.price.toFixed(2)}</div>
        `;
                grid.appendChild(card);
            });
        }

        function renderCart() {
            orderList.innerHTML = '';
            let subtotal = 0;

            cart.forEach(item => {
                subtotal += item.price * item.qty;
                const div = document.createElement('div');
                div.className = 'order-item';
                div.innerHTML = `
          <div class="order-info">
            <div class="order-img">${item.icon}</div>
            <div>
              <div style="font-weight:600;">${item.name}</div>
              <div style="color:var(--primary);">$${item.price.toFixed(2)}</div>
            </div>
          </div>
          <div class="qty-controls">
            <div class="qty-btn" onclick="updateQty(${item.id}, -1)">-</div>
            <span>${item.qty}</span>
            <div class="qty-btn" onclick="updateQty(${item.id}, 1)">+</div>
          </div>
        `;
                orderList.appendChild(div);
            });

            const tax = subtotal * 0.10;
            const total = subtotal + tax;

            document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
            document.getElementById('tax').textContent = '$' + tax.toFixed(2);
            document.getElementById('total').textContent = '$' + total.toFixed(2);
        }

        function addToCart(p) {
            const existing = cart.find(item => item.id === p.id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...p, qty: 1 });
            }
            renderCart();
        }

        function updateQty(id, change) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += change;
                if (item.qty <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
            }
            renderCart();
        }

        renderProducts();
        renderCart();
    </script>
</body>

</html>
